name: Auto Apply Runner

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  auto-apply:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Download latest DB from scrape workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          name: jobs-db
          path: .
          search_artifacts: true
          if_no_artifact_found: warn
          workflow: scrape.yml

      - name: Verify DB exists
        run: |
          python -c "from src.db.database import init_db, get_session; from src.db.models import Job; init_db(); s = get_session(); print(f'Jobs in DB: {s.query(Job).count()}'); s.close()"

      - name: Run auto-apply
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          APPLICANT_EMAIL: ${{ secrets.APPLICANT_EMAIL }}
          APPLICANT_PHONE: ${{ secrets.APPLICANT_PHONE }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          HEADLESS: "true"
        run: python -m src.applicant.runner

      - name: Upload DB artifact
        if: always() && hashFiles('jobs.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db
          path: jobs.db
          retention-days: 90
          overwrite: true

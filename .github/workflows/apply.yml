name: Apply to Jobs

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Poll Telegram and apply
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_COOKIES_JSON: ${{ secrets.LINKEDIN_COOKIES_JSON }}
          APPLICANT_EMAIL: ${{ secrets.APPLICANT_EMAIL }}
          APPLICANT_PHONE: ${{ secrets.APPLICANT_PHONE }}
        run: python -m src.applicant.runner

      - name: Commit updated DB
        run: |
          git pull --rebase
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.db telegram_offset.txt
          git diff --cached --quiet || git commit -m "chore: update jobs.db [skip ci]"
          git push

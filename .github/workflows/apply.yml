name: Auto Apply Runner

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_url:
        description: "Direct job URL to test (overrides everything else)"
        required: false
        default: ""

jobs:
  auto-apply:
    runs-on: self-hosted
    # Same path as your dev clone: sync+ingest updates jobs.db here; apply seeds GHA workspace from it.
    env:
      JOB_FINDER_DESKTOP: "C:/Users/Berke/Desktop/job_finder"
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Setup venv and install dependencies
        run: |
          if (-not (Test-Path "venv")) { python -m venv venv }
          venv\Scripts\Activate.ps1
          $hash = (Get-FileHash requirements.txt -Algorithm MD5).Hash
          $marker = "venv\.deps_$hash"
          if (-not (Test-Path $marker)) {
            python -m pip install -q -r requirements.txt
            python -m playwright install chromium
            New-Item -Path $marker -ItemType File -Force | Out-Null
          } else {
            Write-Host "Dependencies already up to date, skipping install"
          }

      - name: Copy and clean LinkedIn session if available
        run: |
          $src = Join-Path $env:JOB_FINDER_DESKTOP "linkedin_session.json"
          if (Test-Path $src) {
            Copy-Item $src -Destination "linkedin_session.json" -Force
            venv\Scripts\Activate.ps1
            python -c "import json; p='linkedin_session.json'; d=json.loads(open(p,encoding='utf-8').read()); [c.pop('partitionKey',None) or c.pop('_crHasCrossSiteAncestor',None) for c in d.get('cookies',[])]; open(p,'w',encoding='utf-8').write(json.dumps(d))"
            Write-Host "LinkedIn session loaded and cleaned"
          } else {
            Write-Host "No saved session found - login will be required"
          }

      # Persist runner-applied rows: workspace jobs.db from the PREVIOUS workflow run has applied/failed
      # states. The next run must snapshot that BEFORE overwriting with desktop, or we lose them.
      - name: Backup workspace apply rows before desktop seed
        run: |
          if (Test-Path "jobs.db") {
            venv\Scripts\Activate.ps1
            python -c "from src.db.database import init_db, get_session; from src.db.models import Job; import json; init_db(); s = get_session(); rows = s.query(Job.job_id, Job.apply_status, Job.applied_at).filter(Job.apply_status.notin_(['not_applied', ''])).all(); open('_workspace_pre_seed.json','w',encoding='utf-8').write(json.dumps([{'jid':r[0],'st':r[1],'at':str(r[2]) if r[2] else None} for r in rows])); print('workspace pre-seed:', len(rows), 'rows'); s.close()"
          } else {
            Write-Host "No workspace jobs.db yet (first run on this machine)"
          }

      # Same machine as dev: use jobs.db maintained by scripts/sync_then_ingest (artifact + Telegram).
      # If we copied it, skip artifact download; otherwise download would overwrite this file.
      - name: Seed jobs.db from desktop clone
        id: desktop_jobs_db
        run: |
          $src = Join-Path $env:JOB_FINDER_DESKTOP "jobs.db"
          if (Test-Path $src) {
            Copy-Item -LiteralPath $src -Destination (Join-Path $env:GITHUB_WORKSPACE "jobs.db") -Force
            Write-Host "Seeded workspace jobs.db from $src"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "from_desktop=true"
          } else {
            Write-Host "No desktop jobs.db at $src - will download jobs-db artifact next."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "from_desktop=false"
          }

      - name: Backup local DB apply statuses
        run: |
          if (Test-Path "jobs.db") {
            venv\Scripts\Activate.ps1
            python -c "from src.db.database import init_db, get_session; from src.db.models import Job; init_db(); s = get_session(); rows = s.query(Job.job_id, Job.apply_status, Job.applied_at).filter(Job.apply_status.notin_(['not_applied', ''])).all(); import json; open('_apply_backup.json','w').write(json.dumps([{'jid':r[0],'st':r[1],'at':str(r[2]) if r[2] else None} for r in rows])); print(f'Backed up {len(rows)} apply statuses'); s.close()"
          } else {
            Write-Host "No local DB yet"
          }

      - name: Merge workspace pre-seed and desktop apply backups
        run: |
          venv\Scripts\Activate.ps1
          python -c "from src.db.apply_backup_merge import merge_apply_backup_json_files; print(merge_apply_backup_json_files(['_workspace_pre_seed.json','_apply_backup.json'], '_apply_backup.json'))"

      # Skipped when desktop jobs.db was copied (that DB already includes latest scrape merge + Telegram ingest).
      - name: Download latest jobs.db artifact
        if: ${{ steps.desktop_jobs_db.outputs.from_desktop != 'true' }}
        uses: dawidd6/action-download-artifact@v6
        with:
          name: jobs-db
          path: .
          search_artifacts: true
          workflow_search: true
          if_no_artifact_found: warn

      - name: Restore apply statuses and normalize DB
        run: |
          venv\Scripts\Activate.ps1
          python -c "from src.db.database import init_db, get_session; from src.db.apply_backup_merge import restore_apply_statuses_from_backup; init_db(); s = get_session(); print(restore_apply_statuses_from_backup(s, merged_backup=True)); s.close()"

      - name: Verify DB exists
        run: |
          venv\Scripts\Activate.ps1
          python -c "from src.db.database import init_db, get_session; from src.db.models import Job; init_db(); s = get_session(); print(f'Jobs in DB: {s.query(Job).count()}'); s.close()"

      - name: Insert test URL as approved job
        if: ${{ github.event.inputs.test_url != '' }}
        run: |
          venv\Scripts\Activate.ps1
          python -c "from src.db.database import init_db, get_session; from src.db.models import Job; init_db(); s = get_session(); url='${{ github.event.inputs.test_url }}'; j = s.query(Job).filter(Job.url == url).first(); j = j or Job(job_id='test_'+str(hash(url))[-8:], title='Test Job', company='Test', url=url, passed_prefilter=True, match_score=99); j.apply_status='approved'; j.applied_at=None; s.merge(j); s.commit(); print(f'Ready to apply: {j.title} @ {j.company} -> {url}'); s.close()"

      - name: Run auto-apply
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          APPLICANT_EMAIL: ${{ secrets.APPLICANT_EMAIL }}
          APPLICANT_PHONE: ${{ secrets.APPLICANT_PHONE }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          HEADLESS: "true"
          PYTHONIOENCODING: "utf-8"
        run: |
          venv\Scripts\Activate.ps1
          python -m src.applicant.runner

      - name: Upload DB artifact
        if: always() && hashFiles('jobs.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db
          path: jobs.db
          retention-days: 90
          overwrite: true

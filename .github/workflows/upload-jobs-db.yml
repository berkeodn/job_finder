# Re-builds the `jobs-db` Actions artifact from branch `gha-jobs-db-staging`.
# Used by local `python -m tools.local_apply` after it pushes an updated jobs.db.
name: Upload jobs-db artifact

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch (jobs.db only)
        uses: actions/checkout@v4
        with:
          ref: gha-jobs-db-staging

      - name: Upload jobs-db artifact
        if: hashFiles('jobs.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db
          path: jobs.db
          retention-days: 90
          overwrite: true
